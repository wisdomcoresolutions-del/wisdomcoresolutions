<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fafafa" />

    <!-- Primary SEO -->
    <title>WisdomCore Solutions | Custom ERP, Cloud & Enterprise Software India</title>
    <meta name="description" content="WisdomCore Solutions builds custom ERP systems, cloud infrastructure, AI-powered automation, and mission-critical database engineering for enterprises across India." />
    <meta name="keywords" content="custom ERP software India, enterprise software development, cloud solutions India, database engineering, AI automation, hospital management system, POS billing software, construction ERP, dairy ERP, WisdomCore Solutions" />
    <meta name="author" content="WisdomCore Solutions" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://wisdomcoresolutions.store/" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="WisdomCore Solutions" />
    <meta property="og:title" content="WisdomCore Solutions | Custom ERP & Enterprise Software India" />
    <meta property="og:description" content="Precision-engineered ERP systems, cloud infrastructure, AI automation, and database solutions for growing enterprises across India." />
    <meta property="og:url" content="https://wisdomcoresolutions.store/" />
    <meta property="og:image" content="https://wisdomcoresolutions.store/og-cover.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@wisdomcoresolutions" />
    <meta name="twitter:creator" content="@wisdomcoresolutions" />
    <meta name="twitter:title" content="WisdomCore Solutions | Custom ERP & Enterprise Software India" />
    <meta name="twitter:description" content="Precision-engineered ERP systems, cloud infrastructure, AI automation, and database solutions for growing enterprises across India." />
    <meta name="twitter:image" content="https://wisdomcoresolutions.store/og-cover.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo-icon.png" />
    <link rel="apple-touch-icon" href="/logo-icon.png" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "WisdomCore Solutions",
      "url": "https://wisdomcoresolutions.store",
      "logo": "https://wisdomcoresolutions.store/logo-icon.png",
      "description": "WisdomCore Solutions builds custom ERP systems, cloud infrastructure, AI automation, and database engineering for enterprises across India.",
      "foundingDate": "2023",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+91-9050524678",
        "contactType": "customer service",
        "email": "wisdomcoresolutions@gmail.com",
        "availableLanguage": ["English", "Hindi"]
      },
      "sameAs": [
        "https://www.linkedin.com/company/wisdomcoresolutions/",
        "https://www.instagram.com/wisdomcoresolutions",
        "https://www.facebook.com/share/1BW6MnGZQY/"
      ],
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "IN"
      }
    }
    </script>

    <!-- Structured Data: Website Search -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "WisdomCore Solutions",
      "url": "https://wisdomcoresolutions.store",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://wisdomcoresolutions.store/blog?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: Blog -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Blog",
      "name": "WisdomCore Technical Ledger",
      "description": "Deep-dive architecture notes, performance engineering reports, and backend optimization strategies from WisdomCore Solutions.",
      "url": "https://wisdomcoresolutions.store/blog",
      "publisher": {
        "@type": "Organization",
        "name": "WisdomCore Solutions",
        "logo": {
          "@type": "ImageObject",
          "url": "https://wisdomcoresolutions.store/logo-icon.png"
        }
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-zinc-50 text-zinc-900">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
